# 凭证示例文件 - 复制为 credentials.yaml 并填入真实值
# credentials.yaml 已在 .gitignore 中，绝不提交到版本控制
#
# 推荐做法：优先使用 .env 环境变量，credentials.yaml 作为备选
# 凭证优先级：环境变量 > credentials.yaml > 此示例文件

providers:
  aliyun:
    access_key_id: "YOUR_ALIYUN_ACCESS_KEY_ID"
    access_key_secret: "YOUR_ALIYUN_ACCESS_KEY_SECRET"

  tencent:
    secret_id: "YOUR_TENCENT_SECRET_ID"
    secret_key: "YOUR_TENCENT_SECRET_KEY"

  huawei:
    access_key_id: "YOUR_HUAWEI_AK"
    secret_access_key: "YOUR_HUAWEI_SK"
    project_id: "YOUR_HUAWEI_PROJECT_ID"

servers:
  # 按服务器 ID 覆盖 WinRM / SSH 凭证
  aliyun-win-sql-001:
    winrm:
      username: "Administrator"
      password: "YOUR_WINDOWS_PASSWORD"

  aliyun-linux-app-001:
    ssh:
      username: "root"
      key_path: "~/.ssh/aliyun_rsa"
      # password: ""   # 密钥登录时留空
